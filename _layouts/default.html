<!DOCTYPE html>
<html lang="en">
<head>
    {% include head.html %}
</head>
<body>
    <div class="container">
        {% include header.html %}

        <!-- PostHog Experiment Helper: must be before {{ content }} so pages can call runExperiment() inline -->
        <script>
        window.runExperiment = function(opts) {
            // opts: { name, flag, variantAId, variantBId }
            var shown = false;

            function showVariant(variant) {
                if (shown) return;
                shown = true;
                var id = (variant === 'b') ? opts.variantBId : opts.variantAId;
                var el = document.getElementById(id);
                if (el) el.style.display = 'block';
                try {
                    if (typeof posthog !== 'undefined' && posthog.capture) {
                        posthog.capture('experiment_variant_shown', {
                            experiment: opts.name,
                            variant: variant
                        });
                    }
                } catch (e) {}
            }

            setTimeout(function() {
                if (!shown) showVariant('a');
            }, 1500);

            try {
                if (typeof posthog !== 'undefined' && posthog.onFeatureFlags) {
                    posthog.onFeatureFlags(function() {
                        var flag = posthog.getFeatureFlag(opts.flag);
                        if (flag === 'test') {
                            showVariant('b');
                        } else {
                            showVariant('a');
                        }
                    });
                }
            } catch (e) {}
        };
        </script>

        <main class="main-content">
            {{ content }}
        </main>

        {% include footer.html %}
    </div>

    <!-- JavaScript -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
